<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dead Noon</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #160f0b;
      color: #fff4dc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at 50% 0%, rgba(216, 112, 55, 0.23), transparent 40%),
        #160f0b;
    }

    main {
      width: min(100%, 1040px);
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(34px, 7vw, 58px);
      font-weight: 500;
      letter-spacing: 0;
    }

    .eyebrow {
      margin: 0 0 2px;
      color: #d5a26f;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .stats {
      display: flex;
      gap: 24px;
      text-align: right;
    }

    .stat-label {
      display: block;
      color: #c49f7e;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .stat-value {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 21px;
      font-variant-numeric: tabular-nums;
    }

    .stage {
      position: relative;
      overflow: hidden;
      border: 1px solid #6b4733;
      border-radius: 8px;
      background: #c56a3c;
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.45);
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      cursor: crosshair;
      touch-action: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 30px;
      text-align: center;
      background: rgba(25, 15, 10, 0.76);
      backdrop-filter: blur(4px);
    }

    .overlay[hidden] {
      display: none;
    }

    .overlay h2 {
      margin: 0 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(32px, 7vw, 52px);
      font-weight: 500;
      letter-spacing: 0;
    }

    .overlay p {
      max-width: 520px;
      margin: 0 auto 20px;
      color: #ead7c4;
      line-height: 1.55;
    }

    button {
      min-height: 44px;
      border: 1px solid #b98759;
      border-radius: 6px;
      background: #493020;
      color: #fff4dc;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      background: #5b3d29;
    }

    button:focus-visible {
      outline: 3px solid #ffd36b;
      outline-offset: 3px;
    }

    #start-button {
      padding: 0 24px;
      border-color: #f1bd55;
      background: #f1bd55;
      color: #2a190f;
    }

    #start-button:hover {
      background: #ffd073;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 12px;
    }

    .hint {
      margin: 0;
      color: #c9ad96;
      font-size: 14px;
      line-height: 1.4;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .action-button {
      padding: 0 16px;
    }

    .ammo-panel {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 38px;
      margin-top: 10px;
    }

    .ammo-label {
      color: #c9ad96;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .cylinder {
      display: grid;
      grid-template-columns: repeat(6, 22px);
      gap: 6px;
    }

    .round {
      width: 22px;
      height: 11px;
      border: 1px solid #8e6035;
      border-radius: 2px 7px 7px 2px;
      background: #d99a3e;
      box-shadow: inset -5px 0 #f2c56d;
    }

    .round.spent {
      border-color: #4e4035;
      background: #312922;
      box-shadow: none;
    }

    .reload-status {
      color: #f1bd55;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
    }

    @media (max-width: 700px) {
      body {
        padding: 12px;
      }

      header {
        align-items: start;
      }

      .stats {
        gap: 14px;
      }

      .controls {
        align-items: stretch;
        flex-direction: column;
      }

      .actions {
        width: 100%;
      }

      .action-button {
        flex: 1;
      }

      .cylinder {
        grid-template-columns: repeat(6, 18px);
      }

      .round {
        width: 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <p class="eyebrow">A six-shooter survival game</p>
        <h1>Dead Noon</h1>
      </div>
      <div class="stats" aria-live="polite">
        <div>
          <span class="stat-label">Time</span>
          <span class="stat-value" id="time">0:00</span>
        </div>
        <div>
          <span class="stat-label">Kills</span>
          <span class="stat-value" id="kills">0</span>
        </div>
        <div>
          <span class="stat-label">Score</span>
          <span class="stat-value" id="score">0</span>
        </div>
        <div>
          <span class="stat-label">High</span>
          <span class="stat-value" id="high-score">0</span>
        </div>
      </div>
    </header>

    <section class="stage" aria-label="Dead Noon game">
      <canvas id="game" width="960" height="540"></canvas>
      <div class="overlay" id="overlay">
        <div>
          <h2 id="overlay-title">The dead are coming.</h2>
          <p id="overlay-copy">Click or tap zombies to fire. You get six shots before reloading. Press R whenever you need a fresh cylinder.</p>
          <button id="start-button" type="button">Draw</button>
        </div>
      </div>
    </section>

    <div class="ammo-panel" aria-live="polite">
      <span class="ammo-label">Cylinder</span>
      <div class="cylinder" id="cylinder" aria-label="Six rounds remaining"></div>
      <span class="reload-status" id="reload-status"></span>
    </div>

    <div class="controls">
      <p class="hint">Aim and click to shoot. Press R to reload. Space pauses.</p>
      <div class="actions">
        <button class="action-button" id="reload-button" type="button">Reload [R]</button>
        <button class="action-button" id="pause-button" type="button">Pause</button>
        <button class="action-button" id="restart-button" type="button">Restart</button>
      </div>
    </div>
  </main>

  <script>
    const canvas = document.querySelector("#game");
    const context = canvas.getContext("2d");
    const overlay = document.querySelector("#overlay");
    const overlayTitle = document.querySelector("#overlay-title");
    const overlayCopy = document.querySelector("#overlay-copy");
    const startButton = document.querySelector("#start-button");
    const reloadButton = document.querySelector("#reload-button");
    const pauseButton = document.querySelector("#pause-button");
    const restartButton = document.querySelector("#restart-button");
    const cylinder = document.querySelector("#cylinder");
    const reloadStatus = document.querySelector("#reload-status");
    const timeElement = document.querySelector("#time");
    const killsElement = document.querySelector("#kills");
    const scoreElement = document.querySelector("#score");
    const highScoreElement = document.querySelector("#high-score");

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;
    const GROUND_Y = 445;
    const PLAYER_X = 122;
    const PLAYER_HIT_X = 175;
    const MAX_AMMO = 6;
    const RELOAD_MS = 1250;

    let running = false;
    let paused = false;
    let reloading = false;
    let ammo = MAX_AMMO;
    let zombies = [];
    let particles = [];
    let tracers = [];
    let combatText = [];
    let kills = 0;
    let elapsed = 0;
    let lastFrame = 0;
    let spawnClock = 0;
    let reloadClock = 0;
    let muzzleClock = 0;
    let shake = 0;
    let aim = { x: 700, y: 300 };
    let score = 0;
    let highScore = Number(localStorage.getItem("deadNoonHighScore") || 0);
    let audioContext;

    function formatTime(milliseconds) {
      const totalSeconds = Math.floor(milliseconds / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function updateHud() {
      const currentScore = score + Math.floor(elapsed / 1000) * 5;
      timeElement.textContent = formatTime(elapsed);
      killsElement.textContent = kills;
      scoreElement.textContent = currentScore;
      highScoreElement.textContent = Math.max(highScore, currentScore);
      cylinder.innerHTML = "";
      for (let index = 0; index < MAX_AMMO; index += 1) {
        const round = document.createElement("span");
        round.className = index < ammo ? "round" : "round spent";
        cylinder.append(round);
      }
      cylinder.setAttribute("aria-label", `${ammo} of ${MAX_AMMO} rounds remaining`);
      reloadStatus.textContent = reloading ? "RELOADING..." : ammo === 0 ? "EMPTY" : "";
      reloadButton.disabled = reloading || ammo === MAX_AMMO || !running;
    }

    function resetGame() {
      zombies = [];
      particles = [];
      tracers = [];
      combatText = [];
      kills = 0;
      score = 0;
      elapsed = 0;
      spawnClock = 600;
      reloadClock = 0;
      muzzleClock = 0;
      shake = 0;
      ammo = MAX_AMMO;
      reloading = false;
      paused = false;
      pauseButton.textContent = "Pause";
      updateHud();
      draw();
    }

    function startGame() {
      resetGame();
      running = true;
      overlay.hidden = true;
      lastFrame = performance.now();
      requestAnimationFrame(loop);
    }

    function spawnZombie() {
      const difficulty = Math.min(elapsed / 90000, 1);
      const size = 0.88 + Math.random() * 0.24;
      const speed = 34 + difficulty * 34 + Math.random() * 20;
      const maxHealth = 2 + Math.floor(elapsed / 15000);
      zombies.push({
        x: WIDTH + 45,
        y: GROUND_Y,
        width: 46 * size,
        height: 104 * size,
        speed,
        health: maxHealth,
        maxHealth,
        flash: 0,
        phase: Math.random() * Math.PI * 2,
        tint: Math.random() > 0.5 ? "#728555" : "#667852"
      });
    }

    function reload() {
      if (!running || paused || reloading || ammo === MAX_AMMO) return;
      reloading = true;
      reloadClock = RELOAD_MS;
      updateHud();
      playReloadSound();
    }

    function fireAt(x, y) {
      if (!running || paused || reloading) return;
      aim = { x, y };
      if (ammo === 0) {
        reload();
        return;
      }

      ammo -= 1;
      muzzleClock = 90;
      shake = 7;
      playGunshot();
      tracers.push({ x1: 162, y1: 327, x2: x, y2: y, life: 80 });

      let target = null;
      let targetIndex = -1;
      for (let index = zombies.length - 1; index >= 0; index -= 1) {
        const zombie = zombies[index];
        const top = zombie.y - zombie.height;
        const padding = 12;
        if (
          x >= zombie.x - zombie.width / 2 - padding &&
          x <= zombie.x + zombie.width / 2 + padding &&
          y >= top - padding &&
          y <= zombie.y + padding
        ) {
          target = zombie;
          targetIndex = index;
          break;
        }
      }

      if (target) {
        const targetTop = target.y - target.height;
        const headshot = y <= targetTop + target.height * 0.34;
        const damage = headshot ? 2 : 1;
        target.health -= damage;
        target.flash = 110;

        if (target.health <= 0) {
          zombies.splice(targetIndex, 1);
          kills += 1;
          score += headshot ? 150 : 100;
          createHitEffect(
            target.x,
            headshot ? targetTop + target.height * 0.18 : target.y - target.height * 0.58
          );
          createCombatText(
            target.x,
            targetTop - 8,
            headshot ? "HEADSHOT DOWN" : "DOWN",
            headshot ? "#ffd36b" : "#f3d3a5"
          );
        } else {
          createBodyHitEffect(x, y);
          createCombatText(
            target.x,
            targetTop - 8,
            `${headshot ? "HEADSHOT" : "HIT"} ${target.health}/${target.maxHealth}`,
            headshot ? "#ffd36b" : "#f3d3a5"
          );
        }
      } else {
        createDustEffect(x, Math.min(y, GROUND_Y));
      }

      if (ammo === 0) {
        setTimeout(() => {
          if (running && !paused && ammo === 0 && !reloading) reload();
        }, 220);
      }
      updateHud();
    }

    function createHitEffect(x, y) {
      for (let index = 0; index < 15; index += 1) {
        particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 150,
          vy: (Math.random() - 0.7) * 150,
          life: 350 + Math.random() * 250,
          color: Math.random() > 0.35 ? "#4f1d1a" : "#9b6f42",
          size: 3 + Math.random() * 5
        });
      }
    }

    function createBodyHitEffect(x, y) {
      for (let index = 0; index < 7; index += 1) {
        particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 100,
          vy: (Math.random() - 0.6) * 90,
          life: 220 + Math.random() * 170,
          color: Math.random() > 0.4 ? "#4f1d1a" : "#c79a65",
          size: 2 + Math.random() * 4
        });
      }
    }

    function createCombatText(x, y, text, color) {
      combatText.push({ x, y, text, color, life: 650 });
    }

    function createDustEffect(x, y) {
      for (let index = 0; index < 7; index += 1) {
        particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 70,
          vy: -20 - Math.random() * 55,
          life: 260 + Math.random() * 180,
          color: "#d8a86b",
          size: 3 + Math.random() * 4
        });
      }
    }

    function endGame() {
      running = false;
      reloading = false;
      const finalScore = score + Math.floor(elapsed / 1000) * 5;
      if (finalScore > highScore) {
        highScore = finalScore;
        localStorage.setItem("deadNoonHighScore", String(highScore));
      }
      updateHud();
      overlayTitle.textContent = "The town fell.";
      overlayCopy.textContent = `Score ${finalScore}. You held the line for ${formatTime(elapsed)} and put down ${kills} ${kills === 1 ? "zombie" : "zombies"}.`;
      startButton.textContent = "Ride again";
      overlay.hidden = false;
    }

    function togglePause() {
      if (!running) return;
      paused = !paused;
      pauseButton.textContent = paused ? "Resume" : "Pause";
      if (paused) {
        overlayTitle.textContent = "Easy, partner.";
        overlayCopy.textContent = "The dead can wait for one breath.";
        startButton.textContent = "Resume";
        overlay.hidden = false;
      } else {
        overlay.hidden = true;
        lastFrame = performance.now();
        requestAnimationFrame(loop);
      }
    }

    function loop(timestamp) {
      if (!running || paused) return;
      const delta = Math.min(timestamp - lastFrame, 40);
      lastFrame = timestamp;
      update(delta);
      draw();
      requestAnimationFrame(loop);
    }

    function update(delta) {
      elapsed += delta;
      spawnClock -= delta;
      muzzleClock = Math.max(0, muzzleClock - delta);
      shake = Math.max(0, shake - delta * 0.04);

      if (spawnClock <= 0) {
        spawnZombie();
        const pressure = Math.min(elapsed / 80000, 1);
        spawnClock = 1200 - pressure * 650 + Math.random() * 580;
      }

      if (reloading) {
        reloadClock -= delta;
        if (reloadClock <= 0) {
          reloading = false;
          ammo = MAX_AMMO;
          updateHud();
          playCylinderClick();
        }
      }

      for (const zombie of zombies) {
        zombie.x -= zombie.speed * delta / 1000;
        zombie.phase += delta * 0.007;
        zombie.flash = Math.max(0, zombie.flash - delta);
        if (zombie.x - zombie.width / 2 <= PLAYER_HIT_X) {
          endGame();
          return;
        }
      }

      particles = particles.filter(particle => {
        particle.life -= delta;
        particle.x += particle.vx * delta / 1000;
        particle.y += particle.vy * delta / 1000;
        particle.vy += 190 * delta / 1000;
        return particle.life > 0;
      });

      tracers = tracers.filter(tracer => {
        tracer.life -= delta;
        return tracer.life > 0;
      });

      combatText = combatText.filter(label => {
        label.life -= delta;
        label.y -= delta * 0.025;
        return label.life > 0;
      });

      updateHud();
    }

    function draw() {
      const offsetX = shake > 0 ? (Math.random() - 0.5) * shake : 0;
      const offsetY = shake > 0 ? (Math.random() - 0.5) * shake : 0;
      context.save();
      context.translate(offsetX, offsetY);
      drawSky();
      drawGround();
      drawScenery();
      drawCowboy();
      for (const zombie of zombies) drawZombie(zombie);
      drawEffects();
      drawCrosshair();
      context.restore();
    }

    function drawSky() {
      const gradient = context.createLinearGradient(0, 0, 0, GROUND_Y);
      gradient.addColorStop(0, "#67344a");
      gradient.addColorStop(0.48, "#cf6843");
      gradient.addColorStop(1, "#efac5f");
      context.fillStyle = gradient;
      context.fillRect(0, 0, WIDTH, GROUND_Y);

      context.fillStyle = "#ffd77b";
      context.beginPath();
      context.arc(760, 135, 53, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = "rgba(59, 32, 38, 0.34)";
      context.beginPath();
      context.moveTo(0, 300);
      context.lineTo(150, 188);
      context.lineTo(268, 306);
      context.lineTo(430, 168);
      context.lineTo(600, 310);
      context.lineTo(760, 226);
      context.lineTo(960, 320);
      context.lineTo(960, GROUND_Y);
      context.lineTo(0, GROUND_Y);
      context.fill();

      context.fillStyle = "rgba(78, 38, 30, 0.58)";
      context.beginPath();
      context.moveTo(0, 354);
      context.lineTo(145, 271);
      context.lineTo(280, 352);
      context.lineTo(475, 267);
      context.lineTo(680, 350);
      context.lineTo(840, 286);
      context.lineTo(960, 348);
      context.lineTo(960, GROUND_Y);
      context.lineTo(0, GROUND_Y);
      context.fill();
    }

    function drawGround() {
      const groundGradient = context.createLinearGradient(0, GROUND_Y, 0, HEIGHT);
      groundGradient.addColorStop(0, "#7d482d");
      groundGradient.addColorStop(1, "#3d281d");
      context.fillStyle = groundGradient;
      context.fillRect(0, GROUND_Y, WIDTH, HEIGHT - GROUND_Y);

      context.strokeStyle = "rgba(255, 212, 151, 0.18)";
      context.lineWidth = 2;
      for (let index = 0; index < 14; index += 1) {
        const y = GROUND_Y + 8 + index * 8;
        context.beginPath();
        context.moveTo((index * 73) % WIDTH, y);
        context.lineTo(Math.min(WIDTH, (index * 73) % WIDTH + 90), y + 2);
        context.stroke();
      }
    }

    function drawScenery() {
      context.fillStyle = "#40291d";
      drawCactus(840, 356, 1);
      drawCactus(665, 395, 0.56);
      context.fillRect(515, 390, 4, 55);
      context.beginPath();
      context.moveTo(485, 399);
      context.lineTo(550, 399);
      context.lineTo(518, 382);
      context.fill();
    }

    function drawCactus(x, y, scale) {
      context.save();
      context.translate(x, y);
      context.scale(scale, scale);
      context.fillRect(-9, 0, 18, 90);
      context.fillRect(-32, 35, 30, 13);
      context.fillRect(-32, 18, 12, 30);
      context.fillRect(2, 49, 33, 13);
      context.fillRect(23, 30, 12, 32);
      context.restore();
    }

    function drawCowboy() {
      context.save();
      context.translate(PLAYER_X, GROUND_Y);

      context.fillStyle = "rgba(30, 15, 10, 0.32)";
      context.beginPath();
      context.ellipse(3, 3, 52, 9, 0, 0, Math.PI * 2);
      context.fill();

      context.strokeStyle = "#2a1c18";
      context.lineWidth = 13;
      context.lineCap = "round";
      context.beginPath();
      context.moveTo(-12, -58);
      context.lineTo(-18, -10);
      context.moveTo(14, -58);
      context.lineTo(22, -10);
      context.stroke();

      context.fillStyle = "#6a3324";
      context.fillRect(-29, -102, 56, 48);
      context.fillStyle = "#c5a16f";
      context.fillRect(-7, -100, 14, 44);
      context.fillStyle = "#30221a";
      context.fillRect(-30, -65, 59, 8);

      context.fillStyle = "#d6a06f";
      context.beginPath();
      context.arc(-2, -130, 23, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = "#6b3c22";
      context.fillRect(-29, -154, 55, 14);
      context.beginPath();
      context.ellipse(-2, -159, 32, 8, 0, 0, Math.PI * 2);
      context.fill();

      context.strokeStyle = "#6a3324";
      context.lineWidth = 14;
      context.beginPath();
      context.moveTo(20, -92);
      context.lineTo(45, -74);
      context.lineTo(69, -76);
      context.stroke();
      context.fillStyle = "#d6a06f";
      context.beginPath();
      context.arc(70, -76, 7, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = "#39312b";
      context.fillRect(67, -82, 27, 9);
      context.fillRect(88, -84, 16, 5);
      context.fillStyle = "#b98b54";
      context.beginPath();
      context.arc(77, -74, 7, 0, Math.PI * 2);
      context.strokeStyle = "#39312b";
      context.lineWidth = 4;
      context.stroke();

      if (muzzleClock > 0) {
        context.fillStyle = "#ffe47e";
        context.beginPath();
        context.moveTo(104, -91);
        context.lineTo(132, -80);
        context.lineTo(105, -69);
        context.lineTo(112, -80);
        context.fill();
      }

      context.restore();
    }

    function drawZombie(zombie) {
      const bob = Math.sin(zombie.phase) * 3;
      context.save();
      context.translate(zombie.x, zombie.y + bob);
      const scale = zombie.height / 104;
      context.scale(scale, scale);

      context.fillStyle = "rgba(30, 15, 10, 0.28)";
      context.beginPath();
      context.ellipse(0, 2, 29, 7, 0, 0, Math.PI * 2);
      context.fill();

      context.strokeStyle = "#39322b";
      context.lineWidth = 11;
      context.lineCap = "round";
      const stride = Math.sin(zombie.phase) * 8;
      context.beginPath();
      context.moveTo(-9, -44);
      context.lineTo(-13 - stride, -5);
      context.moveTo(10, -44);
      context.lineTo(14 + stride, -5);
      context.stroke();

      context.fillStyle = "#4a382d";
      context.fillRect(-24, -79, 48, 40);
      context.fillStyle = zombie.flash > 0 ? "#d4b091" : zombie.tint;
      context.beginPath();
      context.arc(0, -94, 21, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = "#30161a";
      context.fillRect(-12, -91, 7, 4);
      context.fillRect(7, -91, 7, 4);
      context.fillStyle = "#e3c86d";
      context.fillRect(-10, -90, 3, 2);
      context.fillRect(9, -90, 3, 2);
      context.strokeStyle = "#35251f";
      context.lineWidth = 3;
      context.beginPath();
      context.moveTo(-8, -80);
      context.lineTo(9, -80);
      context.stroke();

      context.strokeStyle = zombie.tint;
      context.lineWidth = 10;
      context.beginPath();
      context.moveTo(-20, -70);
      context.lineTo(-37, -50 + stride * 0.3);
      context.moveTo(20, -70);
      context.lineTo(38, -52 - stride * 0.3);
      context.stroke();

      if (zombie.maxHealth > 2 && zombie.health < zombie.maxHealth) {
        context.fillStyle = "rgba(25, 15, 10, 0.72)";
        context.fillRect(-24, -124, 48, 5);
        context.fillStyle = "#d6a459";
        context.fillRect(-24, -124, 48 * zombie.health / zombie.maxHealth, 5);
      }
      context.restore();
    }

    function drawEffects() {
      for (const tracer of tracers) {
        context.strokeStyle = `rgba(255, 231, 132, ${tracer.life / 80})`;
        context.lineWidth = 2;
        context.beginPath();
        context.moveTo(tracer.x1, tracer.y1);
        context.lineTo(tracer.x2, tracer.y2);
        context.stroke();
      }

      for (const particle of particles) {
        context.globalAlpha = Math.min(1, particle.life / 220);
        context.fillStyle = particle.color;
        context.fillRect(particle.x, particle.y, particle.size, particle.size);
      }
      context.globalAlpha = 1;

      context.textAlign = "center";
      context.font = "700 13px ui-monospace, SFMono-Regular, Menlo, monospace";
      for (const label of combatText) {
        context.globalAlpha = Math.min(1, label.life / 220);
        context.fillStyle = label.color;
        context.fillText(label.text, label.x, label.y);
      }
      context.globalAlpha = 1;
    }

    function drawCrosshair() {
      if (!running || paused) return;
      context.strokeStyle = "rgba(255, 244, 220, 0.78)";
      context.lineWidth = 2;
      context.beginPath();
      context.arc(aim.x, aim.y, 14, 0, Math.PI * 2);
      context.moveTo(aim.x - 21, aim.y);
      context.lineTo(aim.x - 8, aim.y);
      context.moveTo(aim.x + 8, aim.y);
      context.lineTo(aim.x + 21, aim.y);
      context.moveTo(aim.x, aim.y - 21);
      context.lineTo(aim.x, aim.y - 8);
      context.moveTo(aim.x, aim.y + 8);
      context.lineTo(aim.x, aim.y + 21);
      context.stroke();
    }

    function canvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const source = event.touches ? event.touches[0] : event;
      return {
        x: (source.clientX - rect.left) * WIDTH / rect.width,
        y: (source.clientY - rect.top) * HEIGHT / rect.height
      };
    }

    function ensureAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playGunshot() {
      ensureAudio();
      const now = audioContext.currentTime;
      const buffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.16, audioContext.sampleRate);
      const data = buffer.getChannelData(0);
      for (let index = 0; index < data.length; index += 1) {
        data[index] = (Math.random() * 2 - 1) * Math.pow(1 - index / data.length, 3);
      }
      const source = audioContext.createBufferSource();
      const gain = audioContext.createGain();
      const filter = audioContext.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.value = 1100;
      gain.gain.setValueAtTime(0.42, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.16);
      source.buffer = buffer;
      source.connect(filter).connect(gain).connect(audioContext.destination);
      source.start();
    }

    function playReloadSound() {
      ensureAudio();
      for (let index = 0; index < 3; index += 1) {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        const start = audioContext.currentTime + index * 0.16;
        oscillator.frequency.value = 180 + index * 45;
        gain.gain.setValueAtTime(0.08, start);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.06);
        oscillator.connect(gain).connect(audioContext.destination);
        oscillator.start(start);
        oscillator.stop(start + 0.07);
      }
    }

    function playCylinderClick() {
      ensureAudio();
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      oscillator.frequency.value = 540;
      gain.gain.setValueAtTime(0.1, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.05);
      oscillator.connect(gain).connect(audioContext.destination);
      oscillator.start();
      oscillator.stop(audioContext.currentTime + 0.06);
    }

    canvas.addEventListener("pointermove", event => {
      aim = canvasPoint(event);
    });
    canvas.addEventListener("pointerdown", event => {
      event.preventDefault();
      const point = canvasPoint(event);
      fireAt(point.x, point.y);
    });
    document.addEventListener("keydown", event => {
      if (event.key === "r" || event.key === "R") reload();
      if (event.code === "Space") {
        event.preventDefault();
        togglePause();
      }
    });
    startButton.addEventListener("click", () => {
      if (running && paused) togglePause();
      else startGame();
    });
    reloadButton.addEventListener("click", reload);
    pauseButton.addEventListener("click", togglePause);
    restartButton.addEventListener("click", startGame);

    updateHud();
    resetGame();
  </script>
</body>
</html>
